<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BRAWLITE ONLINE</title>
<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0c18;touch-action:none;user-select:none;}
canvas{display:block;position:fixed;top:0;left:0;}
.screen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;}
#s-lobby{background:linear-gradient(180deg,#080a18 0%,#04060e 100%);}
#s-charsel{background:linear-gradient(180deg,#08060e 0%,#04020a 100%);display:none;}

.logo{font-family:'Lilita One',sans-serif;font-size:clamp(40px,8vw,68px);letter-spacing:6px;background:linear-gradient(135deg,#FFD700,#FF8C00 50%,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 32px rgba(255,165,0,.5));margin-bottom:2px;text-align:center;}
.logo-sub{font-family:'M PLUS Rounded 1c',sans-serif;font-size:11px;letter-spacing:10px;color:#2a2a4a;text-align:center;margin-bottom:32px;}

.menu-wrap{width:100%;max-width:520px;display:flex;flex-direction:column;gap:10px;}
.menu-btn{position:relative;width:100%;padding:18px 24px;border-radius:16px;border:none;cursor:pointer;font-family:'Lilita One',sans-serif;font-size:15px;letter-spacing:4px;transition:all .2s;display:flex;align-items:center;gap:14px;overflow:hidden;}
.menu-btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s;}
.menu-btn:hover::before{opacity:1;}
.menu-btn:active{transform:scale(.97)!important;}

.btn-quick{background:linear-gradient(135deg,#1a2a50,#0d1530);border:2px solid rgba(100,160,255,.25);color:#6EB4FF;}
.btn-quick::before{background:linear-gradient(135deg,rgba(100,160,255,.08),transparent);}
.btn-quick:hover{border-color:rgba(100,160,255,.5);box-shadow:0 8px 32px rgba(100,160,255,.15);transform:translateY(-2px);}
.btn-quick .btn-icon{font-size:26px;}
.btn-quick .btn-info{text-align:left;}
.btn-quick .btn-title{color:#6EB4FF;font-size:16px;}
.btn-quick .btn-sub{font-family:'M PLUS Rounded 1c',sans-serif;font-size:10px;color:#3a5a8a;letter-spacing:2px;font-weight:400;margin-top:2px;}

.btn-custom{background:linear-gradient(135deg,#1a1520,#0e0b18);border:2px solid rgba(255,255,255,.08);color:#777;}
.btn-custom:hover{border-color:rgba(255,255,255,.18);color:#aaa;transform:translateY(-2px);}
.btn-custom .btn-icon{font-size:22px;}
.btn-custom .btn-info{text-align:left;}
.btn-custom .btn-title{font-size:14px;}
.btn-custom .btn-sub{font-family:'M PLUS Rounded 1c',sans-serif;font-size:10px;color:#3a3a4a;letter-spacing:2px;font-weight:400;margin-top:2px;}

.btn-solo{background:linear-gradient(135deg,#1a1a10,#0e0e08);border:2px solid rgba(255,215,0,.1);color:#aaa;}
.btn-solo:hover{border-color:rgba(255,215,0,.25);color:#FFD700;transform:translateY(-2px);}
.btn-solo .btn-icon{font-size:22px;}
.btn-solo .btn-info{text-align:left;}
.btn-solo .btn-title{font-size:14px;}
.btn-solo .btn-sub{font-family:'M PLUS Rounded 1c',sans-serif;font-size:10px;color:#3a3a2a;letter-spacing:2px;font-weight:400;margin-top:2px;}

.online-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(0,255,150,.07);border:1px solid rgba(0,255,150,.2);border-radius:20px;font-family:'M PLUS Rounded 1c',sans-serif;font-size:10px;color:#00FF88;letter-spacing:2px;margin-bottom:20px;}
.online-dot{width:6px;height:6px;border-radius:50%;background:#00FF88;box-shadow:0 0 8px #00FF88;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

.panel{background:rgba(10,12,34,.97);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:22px;width:100%;max-width:520px;margin-top:10px;}
.panel-title{font-family:'Lilita One',sans-serif;font-size:13px;letter-spacing:4px;color:#555;margin-bottom:14px;}
.panel-row{display:flex;gap:8px;align-items:stretch;}
.code-input{flex:1;padding:13px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:11px;font-family:'Lilita One',sans-serif;font-size:24px;letter-spacing:8px;color:#fff;text-align:center;text-transform:uppercase;outline:none;transition:border-color .2s;}
.code-input:focus{border-color:#FFD700;}
.code-input::placeholder{color:#1e1e2e;font-size:13px;letter-spacing:3px;}
.sbtn{padding:13px 20px;border-radius:11px;border:none;font-family:'Lilita One',sans-serif;font-size:11px;letter-spacing:3px;cursor:pointer;transition:all .18s;white-space:nowrap;}
.sbtn-gold{background:linear-gradient(135deg,#FFB800,#FF8C00);color:#000;}
.sbtn-gold:hover{filter:brightness(1.1);transform:translateY(-1px);}
.sbtn-outline{background:transparent;border:1px solid rgba(255,255,255,.12);color:#666;}
.sbtn-outline:hover{border-color:rgba(255,255,255,.25);color:#aaa;}
.host-area{margin-top:12px;padding:14px;background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.15);border-radius:12px;text-align:center;}
.code-big{font-family:'Lilita One',sans-serif;font-size:32px;letter-spacing:8px;color:#FFD700;text-shadow:0 0 24px rgba(255,215,0,.4);}
.code-hint{font-family:'M PLUS Rounded 1c',sans-serif;font-size:10px;color:#4a4a2a;letter-spacing:2px;margin-top:4px;}

#s-matching{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(4,5,16,.97);gap:0;}
.match-logo{font-family:'Lilita One',sans-serif;font-size:28px;letter-spacing:6px;background:linear-gradient(135deg,#FFD700,#FF8C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:40px;}
.match-arena{position:relative;width:280px;height:160px;margin-bottom:32px;}
.match-player{position:absolute;display:flex;flex-direction:column;align-items:center;gap:8px;}
.match-player.p1{left:0;}.match-player.p2{right:0;}
.match-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;border:3px solid;position:relative;}
.match-avatar::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid currentColor;opacity:.3;animation:spin 3s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.match-pname{font-family:'Lilita One',sans-serif;font-size:12px;letter-spacing:2px;}
.match-vs{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:'Lilita One',sans-serif;font-size:36px;color:#fff;text-shadow:0 0 20px rgba(255,215,0,.5);}
.match-vs span{background:linear-gradient(135deg,#FFD700,#FF8C00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.match-status{font-family:'M PLUS Rounded 1c',sans-serif;font-size:11px;letter-spacing:4px;color:#3a4a6a;margin-bottom:8px;height:20px;text-align:center;}
.match-progress{width:280px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:28px;}
.match-fill{height:100%;background:linear-gradient(90deg,#FFD700,#FF8C00);border-radius:2px;width:0%;transition:width .5s ease;}
.match-fill.searching{animation:searchAnim 2s ease-in-out infinite;}
@keyframes searchAnim{0%{width:0%}50%{width:75%}100%{width:30%}}
.match-fill.found{width:100%;background:linear-gradient(90deg,#00FF88,#00cc66);}
.match-timer{font-family:'Lilita One',sans-serif;font-size:14px;color:#3a3a5a;letter-spacing:2px;margin-bottom:24px;}
.match-cancel{padding:10px 28px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#444;font-family:'Lilita One',sans-serif;font-size:10px;letter-spacing:3px;cursor:pointer;transition:all .2s;}
.match-cancel:hover{border-color:rgba(255,255,255,.2);color:#777;}
.match-mode-sel{display:flex;gap:8px;margin-bottom:28px;}
.match-mode-btn{padding:9px 20px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#555;font-family:'M PLUS Rounded 1c',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;letter-spacing:2px;}
.match-mode-btn.active-pvp{border-color:#ff2d6b;color:#ff2d6b;background:rgba(255,45,107,.1);}
.match-mode-btn.active-coop{border-color:#00FF88;color:#00FF88;background:rgba(0,255,150,.07);}
.srow{display:flex;align-items:center;gap:8px;min-height:18px;}
.dot{width:7px;height:7px;border-radius:50%;background:#252535;flex-shrink:0;transition:all .3s;}
.dot.ok{background:#00ff96;box-shadow:0 0 9px #00ff96;}
.dot.wait{background:#FFD700;box-shadow:0 0 9px #FFD700;animation:dp 1s ease-in-out infinite;}
.dot.err{background:#ff2d6b;box-shadow:0 0 9px #ff2d6b;}
.stxt{font-family:'M PLUS Rounded 1c',sans-serif;font-size:10px;color:#444;letter-spacing:1px;}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.35}}

#charsel-inner{width:100%;max-width:1000px;}
.cs-title{font-family:'Lilita One',sans-serif;font-size:clamp(22px,4vw,36px);letter-spacing:5px;color:#fff;text-align:center;margin-bottom:4px;}
.cs-sub{font-family:'M PLUS Rounded 1c',sans-serif;font-size:11px;color:#3a3a5a;letter-spacing:4px;text-align:center;margin-bottom:20px;}
.char-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px;}
@media(max-width:600px){.char-grid{grid-template-columns:repeat(4,1fr);}}
.char-card{background:rgba(12,10,28,.97);border:2px solid rgba(255,255,255,.07);border-radius:14px;padding:10px 6px;cursor:pointer;transition:all .18s;text-align:center;position:relative;overflow:hidden;}
.char-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.2);}
.char-card.selected{transform:translateY(-4px);}
.char-card.selected::after{content:'✓';position:absolute;top:5px;right:7px;font-size:12px;font-weight:700;font-family:'M PLUS Rounded 1c',sans-serif;}
.char-icon{font-size:clamp(26px,4vw,34px);margin-bottom:4px;display:block;}
.char-name{font-family:'Lilita One',sans-serif;font-size:clamp(10px,1.5vw,13px);letter-spacing:1px;margin-bottom:5px;}
.stat-mini{display:flex;flex-direction:column;gap:2px;}
.stat-bar-wrap{display:flex;align-items:center;gap:3px;}
.stat-label{font-family:'M PLUS Rounded 1c',sans-serif;font-size:8px;color:#555;width:20px;flex-shrink:0;}
.stat-track{flex:1;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.stat-fill{height:100%;border-radius:2px;}
.cs-detail{background:rgba(12,10,28,.97);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:18px 24px;display:flex;align-items:center;gap:20px;margin-bottom:14px;}
.cs-detail-icon{font-size:52px;flex-shrink:0;}
.cs-detail-info{flex:1;}
.cs-detail-name{font-family:'Lilita One',sans-serif;font-size:22px;letter-spacing:3px;margin-bottom:3px;}
.cs-detail-desc{font-family:'M PLUS Rounded 1c',sans-serif;font-size:12px;color:#6a6a8a;line-height:1.7;margin-bottom:10px;}
.cs-stats-row{display:flex;gap:12px;flex-wrap:wrap;}
.cs-stat{text-align:center;}
.cs-stat-val{font-family:'Lilita One',sans-serif;font-size:18px;}
.cs-stat-lbl{font-family:'M PLUS Rounded 1c',sans-serif;font-size:9px;color:#555;letter-spacing:2px;}
.cs-btn-row{display:flex;gap:10px;max-width:500px;margin:0 auto;}
.btn{width:100%;padding:13px;border-radius:11px;border:none;font-family:'Lilita One',sans-serif;font-size:12px;letter-spacing:4px;cursor:pointer;transition:all .18s;}
.btn-gold{background:linear-gradient(135deg,#FFB800,#FF8C00);color:#000;}
.btn-gold:hover{filter:brightness(1.12);transform:translateY(-1px);}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.14);color:#888;}
.btn-outline:hover{border-color:rgba(255,255,255,.3);color:#fff;background:rgba(255,255,255,.04);}
.btn:active{transform:scale(.98)!important;}

#hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:none;}
#mob-joy-base{display:none;position:absolute;bottom:110px;left:60px;width:130px;height:130px;border-radius:50%;border:3px solid rgba(255,255,255,.18);background:rgba(0,0,0,.32);pointer-events:none;}
#mob-joy-thumb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.28);border:2px solid rgba(255,255,255,.5);}
#mob-btns{display:none;position:absolute;bottom:60px;right:24px;flex-direction:column;align-items:center;gap:14px;}
#mob-super-bar-wrap{display:none;position:absolute;bottom:260px;right:18px;width:100px;text-align:center;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="screen" id="s-lobby">
  <div class="logo">BRAWLITE</div>
  <div class="logo-sub">ONLINE ARENA</div>
  <div class="online-badge"><div class="online-dot"></div><span>ONLINE</span></div>
  <div class="menu-wrap">
    <button class="menu-btn btn-quick" onclick="openQuickMatch()">
      <span class="btn-icon">⚡</span>
      <div class="btn-info"><div class="btn-title">QUICK MATCH</div><div class="btn-sub">自動マッチメイキング — 相手を自動で探します</div></div>
      <span style="margin-left:auto;font-size:11px;opacity:.5;">▶</span>
    </button>
    <button class="menu-btn btn-custom" onclick="toggleCustomPanel()">
      <span class="btn-icon">🏠</span>
      <div class="btn-info"><div class="btn-title">CUSTOM MATCH</div><div class="btn-sub">フレンドとプレイ — ルームコードで招待</div></div>
      <span id="custom-arrow" style="margin-left:auto;font-size:11px;opacity:.4;transition:.2s;">▼</span>
    </button>
    <div class="panel" id="custom-panel" style="display:none;">
      <div class="panel-title">CUSTOM MATCH</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="sbtn sbtn-gold" onclick="hostCustomGame()" style="flex:1;">ルームを作成</button>
        <button class="sbtn sbtn-outline" onclick="showJoinPanel()" style="flex:1;">コードで参加</button>
      </div>
      <div id="host-area" style="display:none;margin-top:12px;">
        <div class="host-area">
          <div class="code-big" id="code-txt">------</div>
          <div class="code-hint">このコードを友達に教えてください</div>
          <div class="srow" style="justify-content:center;margin-top:8px;"><div class="dot" id="hd"></div><div class="stxt" id="hs">待機中...</div></div>
          <button class="sbtn sbtn-outline" onclick="copyCode()" style="margin-top:8px;font-size:10px;" id="btn-copy">コードをコピー</button>
        </div>
      </div>
      <div id="join-area" style="display:none;margin-top:12px;">
        <div class="panel-row">
          <input class="code-input" id="ci" placeholder="XXXXXX" maxlength="6" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')joinCustomRoom()">
          <button class="sbtn sbtn-gold" onclick="joinCustomRoom()">JOIN</button>
        </div>
        <div class="srow" style="margin-top:8px;"><div class="dot" id="jd"></div><div class="stxt" id="js">コードを入力してください</div></div>
      </div>
    </div>
    <button class="menu-btn btn-solo" onclick="goCharSel('solo')">
      <span class="btn-icon">🎮</span>
      <div class="btn-info"><div class="btn-title">SOLO PLAY</div><div class="btn-sub">ひとりでウェーブをサバイバル</div></div>
    </button>
  </div>
</div>

<div id="s-matching">
  <div class="match-logo">QUICK MATCH</div>
  <div class="match-mode-sel">
    <button class="match-mode-btn active-pvp" id="qm-pvp" onclick="setQM('pvp')">⚔️ 1v1 PvP</button>
    <button class="match-mode-btn" id="qm-coop" onclick="setQM('coop')">🤝 Co-op</button>
  </div>
  <div class="match-arena">
    <div class="match-player p1">
      <div class="match-avatar" id="ma-p1" style="border-color:#FFD700;background:rgba(255,215,0,.1);color:#FFD700;">⭐</div>
      <div class="match-pname" style="color:#FFD700;" id="mn-p1">YOU</div>
    </div>
    <div class="match-vs"><span>VS</span></div>
    <div class="match-player p2">
      <div class="match-avatar" id="ma-p2" style="border-color:#3a3a5a;background:rgba(255,255,255,.03);color:#555;">?</div>
      <div class="match-pname" style="color:#3a3a5a;" id="mn-p2">???</div>
    </div>
  </div>
  <div class="match-status" id="match-status">相手を探しています...</div>
  <div class="match-progress"><div class="match-fill searching" id="match-fill"></div></div>
  <div class="match-timer" id="match-timer">0s</div>
  <button class="match-cancel" onclick="cancelQuickMatch()">キャンセル</button>
</div>

<div class="screen" id="s-charsel" style="display:none;">
  <div id="charsel-inner">
    <div class="cs-title">CHARACTER SELECT</div>
    <div class="cs-sub">CHOOSE YOUR FIGHTER</div>
    <div class="char-grid" id="char-grid"></div>
    <div class="cs-detail" id="cs-detail">
      <div class="cs-detail-icon" id="cs-icon">⭐</div>
      <div class="cs-detail-info">
        <div class="cs-detail-name" id="cs-name">Gold</div>
        <div class="cs-detail-desc" id="cs-desc">Balanced all-rounder.</div>
        <div class="cs-stats-row">
          <div class="cs-stat"><div class="cs-stat-val" id="cs-s-hp" style="color:#2ECC71">●●●●●</div><div class="cs-stat-lbl">HP</div></div>
          <div class="cs-stat"><div class="cs-stat-val" id="cs-s-spd" style="color:#3498DB">●●●</div><div class="cs-stat-lbl">SPD</div></div>
          <div class="cs-stat"><div class="cs-stat-val" id="cs-s-dmg" style="color:#E74C3C">●●●</div><div class="cs-stat-lbl">ATK</div></div>
          <div class="cs-stat"><div class="cs-stat-val" id="cs-s-regen" style="color:#00FF88">●●</div><div class="cs-stat-lbl">REGEN</div></div>
          <div class="cs-stat"><div class="cs-stat-val" id="cs-s-special" style="color:#9B59B6">−</div><div class="cs-stat-lbl">SUPER</div></div>
        </div>
      </div>
    </div>
    <div class="cs-btn-row">
      <button class="btn btn-outline" onclick="backToLobby()" style="max-width:160px;">← Back</button>
      <button class="btn btn-gold" onclick="confirmChar()" id="cs-confirm">Confirm!</button>
    </div>
  </div>
</div>

<div id="hud">
  <div id="hud-top" style="position:absolute;top:0;left:0;right:0;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(0,0,0,.72) 0%,transparent 100%);">
    <div style="display:flex;align-items:center;gap:9px;min-width:230px;">
      <div id="p1-avatar" style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:2px solid #FFD700;background:rgba(255,215,0,.12);">⭐</div>
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
          <span style="font-family:'Lilita One',sans-serif;font-size:11px;letter-spacing:2px;" id="p1-name-hud">YOU</span>
          <span style="font-family:'M PLUS Rounded 1c',sans-serif;font-size:10px;color:#ffffff66;" id="p1-hp-txt">4000/4000</span>
        </div>
        <div style="background:rgba(0,0,0,.5);border-radius:5px;height:12px;overflow:hidden;"><div id="p1-hp-bar" style="height:100%;width:100%;background:linear-gradient(90deg,#27AE60,#2ECC71);border-radius:5px;transition:width .12s,background .3s;"></div></div>
        <div style="margin-top:3px;background:rgba(0,0,0,.4);border-radius:4px;height:5px;overflow:hidden;"><div id="p1-regen-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#00c96e,#00FF88);border-radius:4px;transition:width .1s;"></div></div>
      </div>
    </div>
    <div style="text-align:center;flex-shrink:0;">
      <div style="font-family:'M PLUS Rounded 1c',sans-serif;font-size:9px;color:#ffffff33;letter-spacing:3px;">WAVE</div>
      <div style="font-family:'Lilita One',sans-serif;font-size:24px;color:#fff;letter-spacing:2px;" id="hud-wave">1</div>
      <div style="font-family:'Lilita One',sans-serif;font-size:12px;color:#FFD700;" id="hud-score">⭐ 0</div>
    </div>
    <div style="display:flex;align-items:center;gap:9px;flex-direction:row-reverse;min-width:230px;" id="p2-hud-box">
      <div id="p2-avatar" style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:2px solid #ff2d6b;background:rgba(255,45,107,.12);">😈</div>
      <div style="flex:1;text-align:right;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;flex-direction:row-reverse;">

const aimT={active:false,id:null};
function updateJoyVisual(){
  const base=document.getElementById('mob-joy-base'),thumb=document.getElementById('mob-joy-thumb');
  if(!base||!thumb)return;
  if(joy.active){base.style.left=(joy.bx-65)+'px';base.style.bottom=(H-joy.by-65)+'px';thumb.style.transform=`translate(calc(-50% + ${joy.x}px), calc(-50% + ${joy.y}px))`;}

C.addEventListener('touchstart',e=>{e.preventDefault();iAudio();aCtx&&aCtx.resume();for(const t of e.changedTouches){if(t.clientX<W*0.55&&!joy.active){joy.active=true;joy.id=t.identifier;joy.bx=t.clientX;joy.by=t.clientY;joy.x=0;joy.y=0;if(isMobile()){const b=document.getElementById('mob-joy-base');if(b){b.style.left=(t.clientX-65)+'px';b.style.bottom=(H-t.clientY-65)+'px';}}}else if(!aimT.active){aimT.active=true;aimT.id=t.identifier;mouse.x=t.clientX;mouse.y=t.clientY;mouse.down=true;}}},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===joy.id){const dx=t.clientX-joy.bx,dy=t.clientY-joy.by,d=Math.sqrt(dx*dx+dy*dy),m=60;joy.x=dx/Math.max(d,m)*Math.min(d,m);joy.y=dy/Math.max(d,m)*Math.min(d,m);updateJoyVisual();}if(t.identifier===aimT.id){mouse.x=t.clientX;mouse.y=t.clientY;}}},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===joy.id){joy.active=false;joy.x=0;joy.y=0;updateJoyVisual();}if(t.identifier===aimT.id){aimT.active=false;mouse.down=false;}}},{passive:false});

function isInGrass(e){for(const g of GRASS)if(e.x>g.x&&e.x<g.x+g.w&&e.y>g.y&&e.y<g.y+g.h)return true;return false;}
function pushOut(e){for(const o of WALLS){if(cRect(e.x,e.y,e.r,o.x,o.y,o.w,o.h)){const ol=(e.x+e.r)-o.x,or_=(o.x+o.w)-(e.x-e.r),ot=(e.y+e.r)-o.y,ob=(o.y+o.h)-(e.y-e.r),m=Math.min(ol,or_,ot,ob);if(m===ol)e.x=o.x-e.r;else if(m===or_)e.x=o.x+o.w+e.r;else if(m===ot)e.y=o.y-e.r;else e.y=o.y+o.h+e.r;}}}

let selectedCharId=0,pendingMode='solo';
function dotsStr(n,max,col){return`<span style="color:${col}">${'●'.repeat(n)}</span><span style="color:#2a2a3a">${'●'.repeat(max-n)}</span>`;}
function buildCharGrid(){
  const grid=document.getElementById('char-grid');grid.innerHTML='';
  CHARS.forEach(ch=>{
    const div=document.createElement('div');div.className='char-card'+(selectedCharId===ch.id?' selected':'');
    div.style.borderColor=selectedCharId===ch.id?ch.col:'rgba(255,255,255,.07)';

function selectChar(id){
  selectedCharId=id;buildCharGrid();

function backToLobby(){

}
function confirmChar(){
  const ch=CHARS[selectedCharId];applyCharToPlayer(ch,PL);
  document.getElementById('s-charsel').style.display='none';
  if(pendingMode==='solo')doStartSolo();
  else if(pendingMode==='quickmatch')startQuickMatchmaking();
  else if(pendingMode==='host')doStartHost();

}
function applyCharToPlayer(ch,pl){
  pl.r=ch.r;pl.maxHp=ch.maxHp;pl.hp=ch.maxHp;pl.spd=ch.spd;pl.shootDelay=ch.shootDelay;
  pl.bulletDmg=ch.bulletDmg;pl.bulletSpd=ch.bulletSpd;pl.hpRegen=ch.hpRegen;pl.col=ch.col;pl.col2=ch.col2;

// ====== NETWORK ======
/*
 * ネットワーク設計（一から書き直し）
 *
 * [クイックマッチ]
 * 6個の固定スロット: "qm-pvp-0"〜"qm-pvp-5" / "qm-coop-0"〜"qm-coop-5"
 * → Peer(スロットID)が成功 = HOST確定（7秒ゲストを待つ）
 * → unavailable-id   = そのスロットにホストがいる = GUEST確定（そのまま接続）
 * → 7秒/5秒で無反応  = 次のスロットへ
 * 時間ウィンドウなし・probeなし・シンプル一本。
 *
 * [カスタムマッチ]
 * ホスト: Peer(roomCode) → 接続を待つ
 * ゲスト: Peer(undefined) → peer.connect(roomCode)
 *
 * [接続確立後]
 * → onConnected() を呼ぶ（共通処理）
 * → 自分のキャラ情報を送る
 * → 即 initOnlineGame() でゲーム開始
 */

function startQuickMatchmaking(){
  _qm=true;
  document.getElementById('s-matching').style.display='flex';
  const ch=CHARS[selectedCharId];
  document.getElementById('ma-p1').textContent=ch.icon;
  document.getElementById('ma-p1').style.borderColor=ch.col;
  document.getElementById('ma-p1').style.background=ch.col+'18';
  document.getElementById('ma-p1').style.color=ch.col;
  document.getElementById('mn-p1').textContent=ch.name;
  document.getElementById('mn-p1').style.color=ch.col;
  document.getElementById('match-fill').className='match-fill searching';
  document.getElementById('match-status').textContent='相手を探しています...';
  document.getElementById('match-status').style.color='#3a4a6a';
  _matchTimerStart=Date.now();
  _matchTimerInterval=setInterval(()=>{
    document.getElementById('match-timer').textContent=Math.floor((Date.now()-_matchTimerStart)/1000)+'s';
  },500);
  qmTry(0);
}

function qmTry(slot){
  if(!_qm)return;
  const myId=++_qmId;
  const offsets=[0,-1,1,-2,2,-3,3];
  const slotNum=Math.floor(Date.now()/15000)+offsets[slot%offsets.length];
  const slotId='brawlite-'+quickMatchMode+'-'+slotNum;
  killPeer();
  document.getElementById('match-status').textContent='接続中...';

  peer=new Peer(slotId,PCFG);

  // スロットを取れた → HOST
  peer.on('open',()=>{
    if(!_qm||_qmId!==myId)return;
    isHost=true;
    document.getElementById('match-status').textContent='相手を待っています...';
    peer.on('connection',c=>{
      if(!_qm||_qmId!==myId){c.close();return;}
      conn=c;qmSuccess();
    });
    // 7秒待っても誰も来なければ次のスロット
    setTimeout(()=>{if(_qm&&_qmId===myId)qmTry(slot+1);},7000);
  });

  // スロット取得失敗 → GUEST として接続
  peer.on('error',err=>{
    if(!_qm||_qmId!==myId)return;
    if(err.type==='unavailable-id'){
      isHost=false;
      document.getElementById('match-status').textContent='相手に接続中...';
      killPeer();
      peer=new Peer(undefined,PCFG);
      peer.on('open',()=>{
        if(!_qm||_qmId!==myId)return;
        conn=peer.connect(slotId,{reliable:true,serialization:'json'});
        // 5秒で繋がらなければ幽霊スロット → 次へ
        const t=setTimeout(()=>{if(_qm&&_qmId===myId)qmTry(slot+1);},5000);
        conn.on('open',()=>{if(!_qm||_qmId!==myId){clearTimeout(t);return;}clearTimeout(t);qmSuccess();});
        conn.on('error',()=>{clearTimeout(t);if(_qm&&_qmId===myId)qmTry(slot+1);});
      });
      peer.on('error',()=>{if(_qm&&_qmId===myId)qmTry(slot+1);});
    } else {
      setTimeout(()=>{if(_qm&&_qmId===myId)qmTry(slot+1);},2000);
    }
  });
}

function qmSuccess(){
  _qm=false;clearInterval(_matchTimerInterval);
  gameMode=quickMatchMode;
  document.getElementById('match-fill').className='match-fill found';
  document.getElementById('match-status').textContent='マッチング成功！';
  document.getElementById('match-status').style.color='#00FF88';
  sfx(523,'sine',.2,.3);setTimeout(()=>sfx(659,'sine',.2,.3),120);setTimeout(()=>sfx(784,'sine',.25,.3),240);
  setTimeout(()=>onConnected(),800);
}

function cancelQuickMatch(){
  _qm=false;_qmId++;
  clearInterval(_matchTimerInterval);
  killPeer();connected=false;isHost=false;
  document.getElementById('s-matching').style.display='none';
  document.getElementById('s-lobby').style.display='flex';
}

function doStartJoin(){
  isHost=false;roomCode=_pendingJoinCode;
  setStatus('jd','js','wait','接続中...');
  killPeer();
  peer=new Peer(undefined,PCFG);
  peer.on('open',()=>{
    setStatus('jd','js','wait','ルーム '+roomCode+' に参加中...');
    conn=peer.connect(roomCode,{reliable:true,serialization:'json'});
    const t=setTimeout(()=>setStatus('jd','js','err','タイムアウト — コードを確認してください'),15000);
    conn.on('open',()=>{clearTimeout(t);setStatus('jd','js','ok','接続しました！');onConnected();});
    conn.on('error',()=>{clearTimeout(t);setStatus('jd','js','err','接続失敗');});
  });
  peer.on('error',e=>setStatus('jd','js','err','エラー ('+e.type+')'));
  document.getElementById('s-lobby').style.display='flex';
  document.getElementById('custom-panel').style.display='block';
  document.getElementById('join-area').style.display='block';
  document.getElementById('custom-arrow').textContent='▲';
}

function onConnected(){
  conn.on('data',onNetData);
  conn.on('close',()=>{
    connected=false;
    if(gameState==='playing'){showBanner('相手が切断しました','#ff2d6b',99);setTimeout(()=>location.reload(),4000);}
  });
  const start=()=>{
    connected=true;
    ['s-matching','s-lobby','s-charsel'].forEach(id=>document.getElementById(id).style.display='none');
    document.getElementById('hud').style.display='block';
    document.getElementById('p2-hud-box').style.display='flex';
    const me={col:PL.col,col2:PL.col2,icon:PL.charIcon,name:PL.charName,
              r:PL.r,maxHp:PL.maxHp,superAbility:PL.superAbility,hpRegen:PL.hpRegen};
    if(isHost){send({type:'handshake',mode:gameMode,p2char:me});}
    else{send({type:'guest_char',p1char:me});}
    initOnlineGame();
  };
  if(conn.open)start();else conn.on('open',start);
}

function buildOnlineWave(wi){
  const isBossWave=(wi+1)%5===0,scale=1+wi*0.14,groups=[];

}

function onNetData(data){
  if(!data||!data.type)return;
  switch(data.type){
    case 'handshake':gameMode=data.mode;if(data.p2char)applyP2Char(data.p2char);break;
    case 'guest_char':if(data.p1char)applyP2Char(data.p1char);break;
    case 'p2pos':P2.x=data.x;P2.y=data.y;P2.angle=data.a;P2.hp=data.hp;P2.alive=data.alive;P2.superCharge=data.sc;break;
    case 'p2bullet':p2Bullets.push({x:data.x,y:data.y,vx:data.vx,vy:data.vy,dmg:data.dmg,life:data.life||1.5,r:data.r||8,col:P2.col});break;
    case 'p2super':fireSuper(P2,false);break;
    case 'p2gem':gems=gems.filter(g=>g.id!==data.id);score+=50;updateHUD();break;
    case 'enemy_hit':if(isHost){const e=enemies.find(x=>x.id===data.id);if(e){e.hp-=data.dmg;e.hitFlash=0.1;if(e.hp<=0){killEnemy(e);send({type:'enemy_killed',id:data.id});}else send({type:'enemy_hp',id:data.id,hp:e.hp});}}break;
    case 'enemy_hp':{const eh=enemies.find(x=>x.id===data.id);if(eh){eh.hp=data.hp;eh.hitFlash=0.1;}}break;
    case 'enemy_killed':{const ek=enemies.find(x=>x.id===data.id);if(ek)killEnemy(ek);}break;
    case 'start_game':
      if(!isHost){clearTimeout(_guestStartTimer);countdownAndStart();}break;
    case 'p2bomb':
      p2Bombs.push({x:data.sx,y:data.sy,tx:data.tx,ty:data.ty,startX:data.sx,startY:data.sy,t:0,maxT:data.maxT,dmg:data.dmg,radius:data.radius,col:data.col,owner:'p2'});break;
    case 'gas_state':if(!isHost){GAS.cx=data.cx;GAS.cy=data.cy;GAS.r=data.r;GAS.phase=data.p;GAS.dmgPerSec=data.d;}break;
    case 'wave_start':if(!isHost)receiveWave(data.enemies,data.waveNum);break;
    case 'gem_spawn':gems.push(data.gem);break;
    case 'pvp_hit':PL.hp-=data.dmg;PL.invincible=PL.invDuration;shake(10);burst(PL.x,PL.y,P2.col,8,120,4,.3);if(PL.hp<=0){PL.alive=false;send({type:'pvp_dead'});endGame(false);}updateHUD();break;
    case 'pvp_dead':P2.alive=false;endGame(true);break;
    case 'game_over':endGame(data.win);break;
  }
}

function spawnWave(wi){
  waveKills=0;waveTotal=0;const we=[];let si=0;

    const def=SOLO_WAVES[Math.min(wi,SOLO_WAVES.length-1)];
    for(const g of def){const T=ET[g.t];for(let i=0;i<g.n;i++){const sp=ESPAWNS[si%ESPAWNS.length];si++;const e={...T,id:Date.now()+Math.random(),type:g.t,x:sp.x+(Math.random()-.5)*100,y:sp.y+(Math.random()-.5)*100,hp:T.maxHp,alive:true,angle:0,shootTimer:Math.random()*Math.max(T.shootDelay||1,.5),hitFlash:0,moveAngle:Math.random()*Math.PI*2,changeDirT:0};enemies.push(e);we.push(e);waveTotal++;}}

  } else {
    const{groups,scale,isBossWave}=buildOnlineWave(wi);
    for(const g of groups){const baseT=ET[g.t];for(let i=0;i<g.n;i++){const sp=ESPAWNS[si%ESPAWNS.length];si++;const e={...baseT,id:Date.now()+Math.random(),type:g.t,x:sp.x+(Math.random()-.5)*120,y:sp.y+(Math.random()-.5)*120,hp:Math.round(baseT.maxHp*scale),maxHp:Math.round(baseT.maxHp*scale),spd:baseT.spd*(1+wi*0.04),bulletDmg:baseT.bulletDmg?Math.round(baseT.bulletDmg*scale):undefined,meleeDmg:baseT.meleeDmg?Math.round(baseT.meleeDmg*scale):undefined,shootDelay:baseT.shootDelay?Math.max(0.3,baseT.shootDelay*(1-wi*0.02)):undefined,alive:true,angle:0,shootTimer:Math.random()*Math.max(baseT.shootDelay||1,.5),hitFlash:0,moveAngle:Math.random()*Math.PI*2,changeDirT:0,score:Math.round(baseT.score*scale)};if(e.shootDelay===undefined)delete e.shootDelay;enemies.push(e);we.push(e);waveTotal++;}}
    showBanner('WAVE '+(wi+1)+(wi>=20?' 🔥':''),isBossWave?'#9B59B6':'#FFD700');
    if(isHost&&connected)send({type:'wave_start',enemies:we.map(e=>({...e})),waveNum:wi});
  }
  updateHUD();
}

  const gc=e.isBoss?8:1+Math.floor(Math.random()*2);
  for(let i=0;i<gc;i++){const g={id:Date.now()+Math.random(),x:e.x+(Math.random()-.5)*80,y:e.y+(Math.random()-.5)*80,ph:Math.random()*Math.PI*2};gems.push(g);if(!soloMode&&isHost&&connected)send({type:'gem_spawn',gem:g});}

    score+=600*(waveNum+1);const healAmt=Math.round(PL.maxHp*0.3);PL.hp=Math.min(PL.maxHp,PL.hp+healAmt);
    addText(PL.x,PL.y-70,'+'+healAmt+' HP!','#00FF88');burst(PL.x,PL.y,'#00FF88',20,200,7,.7);

    setTimeout(()=>{waveNum++;if(soloMode&&waveNum>=SOLO_WAVES.length)endGame(true);else spawnWave(waveNum);},2000);
  }
  updateHUD();
}

  if(PL.alive&&(PL.invincible<=0||Math.sin(PL.invincible*40)>0)){drawBrawler(PL.x,PL.y,PL.r,PL.angle,PL.col,PL.col2,0,false,true);hpBar(PL.x,PL.y,PL.r,PL.hp,PL.maxHp,PL.col);ctx.font='bold 11px "M PLUS Rounded 1c"';ctx.textAlign='center';ctx.fillStyle=PL.col;ctx.shadowColor='#000';ctx.shadowBlur=4;ctx.fillText(PL.charIcon+' '+PL.charName,PL.x,PL.y-PL.r-6);ctx.shadowBlur=0;}
  parts.filter(p=>!p.laser).forEach(p=>{const a=p.life/p.ml;if(p.ring){ctx.globalAlpha=a;ctx.beginPath();ctx.arc(p.x,p.y,p.sz+(1-a)*200,0,Math.PI*2);ctx.strokeStyle=p.col;ctx.lineWidth=3*a;ctx.stroke();ctx.globalAlpha=1;}else{ctx.globalAlpha=a;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.1,p.sz*a),0,Math.PI*2);ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=5;ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;}});
  textPops.forEach(t=>{const a=t.life/t.ml;ctx.globalAlpha=a;ctx.font='bold '+t.sz+'px "Lilita One"';ctx.textAlign='center';ctx.fillStyle='rgba(0,0,0,.6)';[[-1,1],[1,1]].forEach(([ox,oy])=>ctx.fillText(t.txt,t.x+ox,t.y+oy));ctx.fillStyle=t.col;ctx.fillText(t.txt,t.x,t.y);ctx.globalAlpha=1;});

  for(const g of GRASS){ctx.save();ctx.globalAlpha=0.72;ctx.fillStyle='rgba(25,95,12,0.68)';ctx.beginPath();ctx.roundRect(g.x,g.y,g.w,g.h,12);ctx.fill();ctx.globalAlpha=0.55;const cols=Math.ceil(g.w/20),rows=Math.ceil(g.h/20);for(let gi=0;gi<cols;gi++)for(let gj=0;gj<rows;gj++){if((gi+gj)%2===0)continue;const gx=g.x+gi*20+10,gy=g.y+gj*20+4;if(gx>g.x+g.w-6||gy>g.y+g.h-3)continue;ctx.fillStyle=`rgba(${45+gj*3},${130+gi*2},${20},0.7)`;ctx.beginPath();ctx.ellipse(gx,gy,4,9,Math.sin(gi+gj)*0.3,0,Math.PI*2);ctx.fill();}ctx.restore();}
  if(PL.alive&&isInGrass(PL)){ctx.save();ctx.globalAlpha=0.8;ctx.font='bold 11px "M PLUS Rounded 1c"';ctx.textAlign='center';ctx.fillStyle='#00FF88';ctx.shadowColor='#000';ctx.shadowBlur=4;ctx.fillText('🌿 HIDDEN',PL.x,PL.y-PL.r-28);ctx.shadowBlur=0;ctx.restore();}
  ctx.restore();

  if(bannerLife>0){const a=Math.min(1,bannerLife*3);ctx.globalAlpha=a;ctx.font='bold clamp(28px,6vw,52px) "Lilita One"';ctx.textAlign='center';ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillText(bannerTxt,W/2+2,H/2+2);ctx.fillStyle=bannerCol;ctx.shadowColor=bannerCol;ctx.shadowBlur=28;ctx.fillText(bannerTxt,W/2,H/2);ctx.shadowBlur=0;ctx.globalAlpha=1;}
  if(gameState==='gameover'||gameState==='win'){ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,0,W,H);ctx.font='bold clamp(22px,4vw,38px) "M PLUS Rounded 1c"';ctx.textAlign='center';ctx.fillStyle='#aaa';ctx.fillText('Score: '+score.toLocaleString(),W/2,H/2+65);ctx.font='bold 16px "M PLUS Rounded 1c"';ctx.fillStyle='#555';ctx.fillText('Click / Tap to retry',W/2,H/2+105);}
}

function loop(ts){frameTs=ts;const dt=Math.min((ts-lastTs)/1e3,.05);lastTs=ts;update(dt,ts);drawGame(ts);if(gameState==='playing'||gameState==='countdown')requestAnimationFrame(loop);else if(gameState==='gameover'||gameState==='win'){drawGame(ts);C.addEventListener('click',retryOnce);}}
function soloLoop(ts){frameTs=ts;const dt=Math.min((ts-lastTs)/1e3,.05);lastTs=ts;update(dt,ts);drawGame(ts);if(gameState==='playing'||gameState==='countdown')requestAnimationFrame(soloLoop);else if(gameState==='gameover'||gameState==='win'){drawGame(ts);C.addEventListener('click',retrySolo);}}
function retryOnce(){C.removeEventListener('click',retryOnce);resetGame();countdownAndStart();}
function retrySolo(){C.removeEventListener('click',retrySolo);resetGame();countdownAndStart();}

function menuBG(ts){
  if(document.getElementById('s-lobby').style.display==='none'&&document.getElementById('s-charsel').style.display==='none'&&document.getElementById('s-matching').style.display==='none')return;
  ctx.fillStyle='rgba(0,0,0,.06)';ctx.fillRect(0,0,W,H);
  const t=ts*.0007;
  CHARS.slice(0,4).forEach((ch,i)=>{ctx.beginPath();for(let x=0;x<W;x+=4){const y=H/2+Math.sin(x*.012+t+i*1.2)*90+Math.sin(x*.024-t*1.1+i)*.35*90;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.strokeStyle=ch.col+'12';ctx.lineWidth=10;ctx.stroke();});
  requestAnimationFrame(menuBG);
}
ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
requestAnimationFrame(menuBG);
</script>
